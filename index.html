    // ==========================================

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const id = Date.now();
      const toast = document.createElement('div');
      
      const themeClasses = 
        type === 'success' ? 'bg-emerald-50/95 dark:bg-emerald-950/95 border-emerald-500 text-emerald-800 dark:text-emerald-100' :
        type === 'error' ? 'bg-rose-50/95 dark:bg-rose-950/95 border-rose-500 text-rose-800 dark:text-rose-100' :
        type === 'warning' ? 'bg-amber-50/95 dark:bg-amber-950/95 border-amber-500 text-amber-800 dark:text-amber-100' :
        'bg-sky-50/95 dark:bg-sky-950/95 border-sky-500 text-sky-800 dark:text-sky-100';

      toast.className = `flex items-center gap-3 p-4 rounded-xl shadow-xl transition-all duration-300 border backdrop-blur-md animate-slide-in-right ${themeClasses}`;
      toast.id = `toast-${id}`;
      
      let iconMarkup = '<i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>';
      if (type === 'error') iconMarkup = '<i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>';
      if (type === 'warning') iconMarkup = '<i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i>';

      toast.innerHTML = `
        ${iconMarkup}
        <span class="text-sm font-medium">${message}</span>
      `;

      container.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

      },
      toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        document.documentElement.className = state.theme;
        saveState();
        renderNavbar();
        renderActiveView();
      },
      addToCart(prodId, qty = 1) {
        const product = state.products.find(p => p.id === prodId);
        if (!product) return;
        if (product.stock <= 0) {
          showToast("Item is out of stock!", "error");
          return;
        }
        const existing = state.cart.find(item => item.id === prodId);
        if (existing) {
          existing.quantity += qty;
          showToast(`Updated quantity for ${product.title} in cart!`, 'info');
        } else {
          state.cart.push({ ...product, quantity: qty });
          showToast(`${product.title} added to shopping cart!`, 'success');
        }
        saveState();
        renderNavbar();
        renderActiveView();
      },
      removeFromCart(prodId) {
        state.cart = state.cart.filter(item => item.id !== prodId);
        showToast("Item removed from your cart.", "info");
        saveState();
        renderNavbar();
        renderActiveView();
      },
      updateCartQty(prodId, delta) {
        const item = state.cart.find(i => i.id === prodId);
        if (item) {
          const newQty = item.quantity + delta;
          item.quantity = newQty < 1 ? 1 : newQty;
          saveState();
          renderNavbar();
          renderActiveView();
        }
      },
      toggleWishlist(prodId) {
        const product = state.products.find(p => p.id === prodId);
        if (!product) return;
        const existsIdx = state.wishlist.findIndex(item => item.id === prodId);
        if (existsIdx > -1) {
          state.wishlist.splice(existsIdx, 1);
          showToast("Removed from Wishlist", "info");
        } else {
          state.wishlist.push(product);
          showToast("Added to Wishlist!", "success");
        }
        saveState();
        renderNavbar();
        renderActiveView();
      },
      toggleCompare(prodId) {
        const product = state.products.find(p => p.id === prodId);
        if (!product) return;
        const existsIdx = state.compareList.findIndex(item => item.id === prodId);
        if (existsIdx > -1) {
          state.compareList.splice(existsIdx, 1);
          showToast("Removed from comparison", "info");
        } else {
          if (state.compareList.length >= 3) {
            showToast("You can only compare up to 3 products at a time.", "warning");
            return;
          }
          state.compareList.push(product);
          showToast("Added to comparison list", "success");
        }
        renderNavbar();
        renderActiveView();
      },
      applyCoupon() {
        const input = document.getElementById('promo-input');
        if (!input) return;
        const code = input.value.trim().toUpperCase();
        if (code === 'SAVE10') {
          state.appliedPromo = { code: 'SAVE10', discountPercent: 10 };
          showToast("Coupon 'SAVE10' applied! 10% discount subtracted.", 'success');
        } else if (code === 'FREESHIP') {
          state.appliedPromo = { code: 'FREESHIP', discountPercent: 0, freeShipping: true };
          showToast("Coupon 'FREESHIP' applied! Free Delivery.", 'success');
        } else if (code === 'SUPER30') {
          state.appliedPromo = { code: 'SUPER30', discountPercent: 30 };
          showToast("Super Coupon 'SUPER30' applied! 30% discount subtracted.", 'success');
        } else {
          showToast("Invalid Promo Code", "error");
        }
        renderActiveView();
      },
      viewProductDetail(prodId) {
        state.activeProductId = prodId;
        const product = state.products.find(p => p.id === prodId);
        if (product) {
          // Track recently viewed
          state.recentlyViewed = [product, ...state.recentlyViewed.filter(i => i.id !== prodId)].slice(0, 6);
          saveState();
        }
        this.setView('product-detail');
      }
    };

    // Helper: Star rating component generator (Static string template)
    function getStarRatingHTML(rating, count) {
      const fullStars = Math.floor(rating);
      const hasHalf = rating % 1 >= 0.5;
      let starsHTML = '';
      for (let i = 0; i < 5; i++) {
        if (i < fullStars) {
          starsHTML += '<i data-lucide="star" class="w-3.5 h-3.5 fill-current text-amber-400"></i>';
        } else if (i === fullStars && hasHalf) {
          starsHTML += '<i data-lucide="star" class="w-3.5 h-3.5 fill-current text-amber-400 opacity-70"></i>';
        } else {
          starsHTML += '<i data-lucide="star" class="w-3.5 h-3.5 text-slate-300 dark:text-slate-600"></i>';
        }
      }
      return `
        <div class="flex items-center gap-1">
          <div class="flex items-center">${starsHTML}</div>
          ${count !== undefined ? `<span class="text-[10px] text-slate-500 ml-1">(${count})</span>` : ''}
        </div>
      `;
    }

    // 2. SHOP LISTING VIEW (WITH ADVANCED SIDEBAR FILTERS)
    function renderShop(container) {
      // Calculate active filters in JavaScript
      const uniqueBrands = ['All', ...new Set(state.products.map(p => p.brand))];
      
      const filtered = state.products.filter(p => {
        const matchSearch = p.title.toLowerCase().includes(state.searchTerm.toLowerCase()) || 
                            p.description.toLowerCase().includes(state.searchTerm.toLowerCase());
        const matchCat = state.selectedCategory === 'All' || p.category === state.selectedCategory;
        const finalPrice = p.price * (1 - p.discount / 100);
        const matchPrice = finalPrice >= state.priceRange[0] && finalPrice <= state.priceRange[1];
        const matchBrand = state.selectedBrand === 'All' || p.brand === state.selectedBrand;
        const matchRating = p.rating >= state.minRating;
        return matchSearch && matchCat && matchPrice && matchBrand && matchRating;
      }).sort((a, b) => {
        const finalA = a.price * (1 - a.discount / 100);
        const finalB = b.price * (1 - b.discount / 100);
        if (state.sortBy === 'low-high') return finalA - finalB;
        if (state.sortBy === 'high-low') return finalB - finalA;
        if (state.sortBy === 'newest') return b.id - a.id;
        return b.rating - a.rating; // popular fallback
      });

    // Interactive quantity support for detail state
    function changeDetailQty(direction, limit = 999) {
      const qtyEl = document.getElementById('detail-qty');
      if (!qtyEl) return;
      let currentVal = parseInt(qtyEl.textContent);
      currentVal += direction;
      if (currentVal < 1) currentVal = 1;
      if (currentVal > limit) currentVal = limit;
      qtyEl.textContent = currentVal;
    }

    // Toggle reviews vs specs inside details layout
    function switchDetailTab(tab) {
      const btnSpecs = document.getElementById('tab-btn-specs');
      const btnRev = document.getElementById('tab-btn-reviews');
      const panelSpecs = document.getElementById('tab-panel-specs');
      const panelRev = document.getElementById('tab-panel-reviews');

      if (tab === 'specs') {
        btnSpecs.className = "pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600";
        btnRev.className = "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-500";
        panelSpecs.classList.remove('hidden');
        panelRev.classList.add('hidden');
      } else {
        btnRev.className = "pb-2 text-sm font-bold border-b-2 border-indigo-600 text-indigo-600";
        btnSpecs.className = "pb-2 text-sm font-bold border-b-2 border-transparent text-slate-500";
        panelSpecs.classList.add('hidden');
        panelRev.classList.remove('hidden');
      }
    }

    // Capture reviews
    function handleNewReviewForm(e, prodId) {
      e.preventDefault();
      const name = document.getElementById('rev-form-name').value;
      const rating = parseInt(document.getElementById('rev-form-rating').value);
      const text = document.getElementById('rev-form-text').value;

      const product = state.products.find(p => p.id === prodId);
      if (product) {
        const newRev = {
          id: Date.now(),
          user: name,
          rating: rating,
          date: new Date().toISOString().split('T')[0],
          comment: text
        };
        product.reviews = [newRev, ...(product.reviews || [])];
        product.reviewsCount = (product.reviewsCount || 0) + 1;
        product.rating = parseFloat(((product.rating * 4 + rating) / 5).toFixed(1));
        
        showToast("Review submitted successfully!", "success");
        saveState();
        renderActiveView();
      }
    }

    function handlePlaceOrder() {
      // Basic checkout validation
      if (paymentMethod === 'card') {
        const num = document.getElementById('card-num').value;
        const exp = document.getElementById('card-exp').value;
        const cvv = document.getElementById('card-cvv').value;
        if (!num || !exp || !cvv) {
          showToast("Card validation failed. Please fill all fields.", "error");
          return;
        }
      } else {
        const upi = document.getElementById('upi-string').value;
        if (!upi || !upi.includes('@')) {
          showToast("Please provide a valid UPI handle.", "error");
          return;
        }
      }

      const totalValue = state.cart.reduce((acc, curr) => acc + (curr.price * (1 - curr.discount / 100)) * curr.quantity, 0) * 1.08;

      const order = {
        id: `ORD-${Math.floor(10000 + Math.random() * 90000)}`,
        date: new Date().toISOString().split('T')[0],
        total: parseFloat(totalValue.toFixed(2)),
        status: 'Processing',
        items: state.cart.map(i => ({ id: i.id, title: i.title, price: i.price * (1 - i.discount/100), quantity: i.quantity }))
      };

      state.orders.push(order);
      state.cart = [];
      showToast("Order dispatched successfully!", "success");
      saveState();
      appActions.setView('profile');
    }

                  ${activeCatalogRows}
                </tbody>
              </table>
            </div>
          </div>

        </div>
      `;
    }

    function toggleAddProductForm() {
      const container = document.getElementById('admin-crud-form-container');
      const actionTitle = document.getElementById('form-action-title');
      
      editingProductData = null;
      actionTitle.textContent = "Create Product Record";
      
      // Reset inputs
      document.getElementById('form-title').value = '';
      document.getElementById('form-price').value = '499';
      document.getElementById('form-discount').value = '0';
      document.getElementById('form-category').value = 'Electronics';
      document.getElementById('form-brand').value = '';
      document.getElementById('form-image').value = '';
      document.getElementById('form-desc').value = '';
      document.getElementById('form-stock').value = '10';

      container.classList.toggle('hidden');
    }

    function closeCrudForm() {
      document.getElementById('admin-crud-form-container').classList.add('hidden');
    }

    function handleAdminEditClick(id) {
      const product = state.products.find(p => p.id === id);
      if (!product) return;

      editingProductData = product;
      document.getElementById('admin-crud-form-container').classList.remove('hidden');
      document.getElementById('form-action-title').textContent = `Edit Product: ${product.title}`;

      document.getElementById('form-title').value = product.title;
      document.getElementById('form-price').value = product.price;
      document.getElementById('form-discount').value = product.discount;
      document.getElementById('form-category').value = product.category;
      document.getElementById('form-brand').value = product.brand;
      document.getElementById('form-image').value = product.image;
      document.getElementById('form-desc').value = product.description;
      document.getElementById('form-stock').value = product.stock;

      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function handleAdminDeleteClick(id) {
      state.products = state.products.filter(p => p.id !== id);
      showToast("Product deleted successfully.", "info");
      saveState();
      renderActiveView();
    }

    function handleProductFormSubmit(e) {
      e.preventDefault();
      const title = document.getElementById('form-title').value;
      const price = parseFloat(document.getElementById('form-price').value);
      const discount = parseInt(document.getElementById('form-discount').value);
      const category = document.getElementById('form-category').value;
      const brand = document.getElementById('form-brand').value;
      const image = document.getElementById('form-image').value;
      const desc = document.getElementById('form-desc').value;
      const stock = parseInt(document.getElementById('form-stock').value);

      if (editingProductData) {
        // Edit record
        editingProductData.title = title;
        editingProductData.price = price;
        editingProductData.discount = discount;
        editingProductData.category = category;
        editingProductData.brand = brand;
        editingProductData.image = image;
        editingProductData.description = desc;
        editingProductData.stock = stock;
        showToast("Product record updated!", "success");
      } else {
        // Create brand new item
        const newProduct = {
          id: Date.now(),
          title,
          price,
          discount,
          category,
          brand,
          description: desc,
          image,
          stock,
          rating: 4.5,
          reviewsCount: 0,
          specs: {},
          reviews: []
        };
        state.products.push(newProduct);
        showToast("New product created!", "success");
      }

      saveState();
      renderActiveView();
    }

    // ==========================================
    // INITIALIZATION ROOT EXECUTIONS
    // ==========================================
    window.onload = function() {
      renderNavbar();
      renderActiveView();
      renderFooter();
    };
  </script>
</body>
</html>
